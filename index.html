<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاريع تعلم Go</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #00add8; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>قائمة مشاريع لغة Go العشرة</h1>
        <table>
            <tr>
    <th>الرقم</th>
    <th>اسم المشروع</th>
    <th>المفهوم</th>
    <th>ملفات المشروع</th>
</tr>
{{range .}}
<tr>
    <td>{{.ID}}</td>
    <td>{{.Title}}</td>
    <td>{{.Skill}}</td>
    <td>
        <a href="{{.Link}}" target="_blank" style="background: #00add8; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 12px;">
            تصفح المجلد 📁
        </a>
    </td>
</tr>
{{end}}
        </table>
    </div>
</body>
</html>
